<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonas de Reparto – La Plata</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }

  header {
    background: #1a1a2e;
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    width: 34px; height: 34px;
    background: #e63946;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header p { font-size: 11px; color: #aaa; margin-top: 1px; }

  .search-bar {
    background: white;
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #e0e0e0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .search-bar input {
    flex: 1;
    padding: 9px 13px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: #1a1a2e; }
  .search-bar button {
    padding: 9px 16px;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .search-bar button:hover { background: #2d2d4e; }

  #result-box {
    display: none;
    margin: 8px 14px 0;
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    border-left: 4px solid #ccc;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  #map {
    width: 100%;
    height: calc(100vh - 170px);
    min-height: 380px;
  }

  .zonas-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: white;
    border-top: 1px solid #e0e0e0;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
  }
  .zona-item {
    padding: 9px 12px;
    border-right: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .zona-item:last-child { border-right: none; }
  .zona-dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.15);
  }
  .zona-info { flex: 1; min-width: 0; }
  .zona-nombre { font-size: 10px; color: #666; }
  .zona-precio { font-size: 15px; font-weight: 700; color: #1a1a2e; line-height: 1.2; }
  .zona-km { font-size: 9px; color: #999; }
  .edit-btn {
    background: none; border: none;
    font-size: 10px; color: #999;
    cursor: pointer; text-decoration: underline;
    padding: 0; margin-top: 2px; display: block;
  }

  @media (max-width: 480px) {
    .zona-precio { font-size: 13px; }
    .zona-item { padding: 7px 8px; gap: 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📦</div>
  <div>
    <h1>Zonas de Reparto</h1>
    <p>Calle 58 N°590 entre 6 y 7 · La Plata</p>
  </div>
</header>

<div class="search-bar">
  <input id="addr-input" type="text" placeholder="Dirección del cliente (ej: Calle 13 y 44, La Plata)" />
  <button onclick="buscarDireccion()">Buscar zona</button>
</div>
<div id="result-box"></div>

<div id="map"></div>

<div class="zonas-bar">
  <div class="zona-item">
    <div class="zona-dot" style="background:#16a34a;border-color:#16a34a;"></div>
    <div class="zona-info">
      <div class="zona-nombre">Zona 1 – Cercana</div>
      <div class="zona-precio" id="p1">$3.500</div>
      <div class="zona-km">hasta ~5 km</div>
      <button class="edit-btn" onclick="editarPrecio(1)">editar</button>
    </div>
  </div>
  <div class="zona-item">
    <div class="zona-dot" style="background:#d97706;border-color:#d97706;"></div>
    <div class="zona-info">
      <div class="zona-nombre">Zona 2 – Media</div>
      <div class="zona-precio" id="p2">$6.500</div>
      <div class="zona-km">5 a 10 km</div>
      <button class="edit-btn" onclick="editarPrecio(2)">editar</button>
    </div>
  </div>
  <div class="zona-item">
    <div class="zona-dot" style="background:#dc2626;border-color:#dc2626;"></div>
    <div class="zona-info">
      <div class="zona-nombre">Zona 3 – Lejana</div>
      <div class="zona-precio" id="p3">$10.000</div>
      <div class="zona-km">más de 10 km</div>
      <button class="edit-btn" onclick="editarPrecio(3)">editar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const ORIGIN = [-34.9218, -57.9548];
const RADIOS = [5000, 10000, 18000];
const ZONE_COLORS = [
  { color: '#16a34a', fill: '#16a34a', opacity: 0.12 },
  { color: '#d97706', fill: '#d97706', opacity: 0.12 },
  { color: '#dc2626', fill: '#dc2626', opacity: 0.12 }
];
const precios = { 1: 3500, 2: 6500, 3: 10000 };
const nombres = ['', 'Zona 1 – Cercana', 'Zona 2 – Media', 'Zona 3 – Lejana'];
const colores = ['', '#16a34a', '#d97706', '#dc2626'];

let map = L.map('map').setView(ORIGIN, 11);
let marcador = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19
}).addTo(map);

for (let i = RADIOS.length - 1; i >= 0; i--) {
  L.circle(ORIGIN, {
    radius: RADIOS[i],
    color: ZONE_COLORS[i].color,
    fillColor: ZONE_COLORS[i].fill,
    fillOpacity: ZONE_COLORS[i].opacity,
    weight: 2.5,
    opacity: 0.9,
    dashArray: i === 1 ? '8,5' : i === 2 ? '4,4' : null
  }).addTo(map);
}

L.circleMarker(ORIGIN, {
  radius: 10,
  fillColor: '#1a1a2e',
  fillOpacity: 1,
  color: 'white',
  weight: 2.5
}).addTo(map).bindPopup('<b>Tu local</b><br>Calle 58 N°590<br>entre 6 y 7, La Plata').openPopup();

function distMetros(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getZona(lat, lng) {
  const d = distMetros(ORIGIN[0], ORIGIN[1], lat, lng);
  const zona = d <= RADIOS[0] ? 1 : d <= RADIOS[1] ? 2 : 3;
  return { zona, precio: precios[zona], km: (d/1000).toFixed(1) };
}

function colocarMarcador(lat, lng, etiqueta) {
  if (marcador) map.removeLayer(marcador);
  marcador = L.marker([lat, lng]).addTo(map);
  const { zona, precio, km } = getZona(lat, lng);
  marcador.bindPopup(`
    <div style="font-family:'Segoe UI',sans-serif;font-size:13px;line-height:1.7;min-width:175px">
      <div style="font-size:12px;color:#555;margin-bottom:3px">${etiqueta}</div>
      <div style="color:${colores[zona]};font-weight:700;font-size:14px">${nombres[zona]}</div>
      <div style="color:#666;font-size:12px">${km} km del local</div>
      <div style="font-size:17px;font-weight:700;color:#1a1a2e;margin-top:3px">Envío: $${precio.toLocaleString('es-AR')}</div>
    </div>
  `).openPopup();
  const rb = document.getElementById('result-box');
  rb.style.display = 'block';
  rb.style.borderLeftColor = colores[zona];
  rb.innerHTML = `<span style="color:${colores[zona]}">${nombres[zona]}</span> &nbsp;·&nbsp; ${km} km &nbsp;·&nbsp; <span style="color:#1a1a2e">Envío: $${precio.toLocaleString('es-AR')}</span>`;
}

map.on('click', function(e) {
  colocarMarcador(e.latlng.lat, e.latlng.lng, 'Punto seleccionado');
});

async function buscarDireccion() {
  const addr = document.getElementById('addr-input').value.trim();
  if (!addr) return;
  const rb = document.getElementById('result-box');
  rb.style.display = 'block';
  rb.style.borderLeftColor = '#ccc';
  rb.innerHTML = 'Buscando...';
  try {
    const q = encodeURIComponent(addr + ', La Plata, Buenos Aires, Argentina');
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&accept-language=es`);
    const data = await res.json();
    if (!data.length) {
      rb.innerHTML = 'No se encontró. Probá con más detalles (barrio, ciudad).';
      return;
    }
    const lat = parseFloat(data[0].lat), lng = parseFloat(data[0].lon);
    map.setView([lat, lng], 14);
    colocarMarcador(lat, lng, addr);
  } catch(e) {
    rb.innerHTML = 'Error de conexión. Verificá internet e intentá de nuevo.';
  }
}

function editarPrecio(zona) {
  const nuevo = prompt(`Precio Zona ${zona} (actual: $${precios[zona].toLocaleString('es-AR')}):`, precios[zona]);
  const n = parseInt(nuevo);
  if (!isNaN(n) && n > 0) {
    precios[zona] = n;
    document.getElementById('p'+zona).textContent = '$'+n.toLocaleString('es-AR');
  }
}

document.getElementById('addr-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') buscarDireccion();
});
</script>
</body>
</html>
